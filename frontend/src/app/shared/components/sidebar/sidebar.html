<!-- Mobile Menu Toggle Button -->
<button
  (click)="toggleMobileMenu()"
  class="lg:hidden fixed top-6 left-6 z-50 p-3 bg-gradient-to-r from-[#0072ab] to-[#00a6e6] text-white rounded-lg shadow-2xl hover:shadow-[#0072ab]/50 hover:scale-110 transition-all duration-300"
  aria-label="Toggle menu">
  <lucide-icon [img]="Menu" [size]="24"></lucide-icon>
</button>

<!-- Overlay for mobile -->
@if (isMobileMenuOpen) {
  <div
    (click)="closeMobileMenu()"
    class="lg:hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-40 transition-all duration-300 animate-fadeIn">
  </div>
}

<!-- Sidebar Container - Collapsible -->
<aside
  [class.translate-x-0]="isMobileMenuOpen"
  [class.w-72]="!isCollapsed"
  [class.w-20]="isCollapsed"
  class="fixed left-0 top-0 h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white shadow-2xl z-40 transform -translate-x-full lg:translate-x-0 transition-all duration-500 ease-out border-r border-[#0072ab]/20 flex flex-col">

  <!-- Animated background gradient -->
  <div class="absolute inset-0 bg-gradient-to-br from-[#0072ab]/5 via-transparent to-[#41a748]/5 animate-gradient"></div>

  <!-- Close button (mobile only) -->
  <button
    (click)="closeMobileMenu()"
    class="lg:hidden absolute top-6 right-6 p-2 hover:bg-white/10 rounded-lg transition-all duration-300 hover:rotate-90 backdrop-blur-sm z-50"
    aria-label="Close menu">
    <lucide-icon [img]="X" [size]="20"></lucide-icon>
  </button>

  <!-- Collapse/Expand Toggle (Desktop only) -->
  <button
    (click)="toggleSidebar()"
    class="hidden lg:flex absolute -right-4 top-8 w-8 h-8 bg-gradient-to-r from-[#0072ab] to-[#00a6e6] rounded-full items-center justify-center shadow-lg hover:shadow-xl hover:scale-110 transition-all duration-300 z-50"
    aria-label="Toggle sidebar">
    <lucide-icon
      [img]="isCollapsed ? ChevronRight : ChevronLeft"
      [size]="18"
      class="text-white">
    </lucide-icon>
  </button>

  <!-- Logo/Brand Section - Fixed at top -->
  <div class="relative flex items-center gap-4 p-6 border-b border-white/10 backdrop-blur-sm flex-shrink-0 overflow-hidden">

    <!-- Logo Container with glow -->
    <div class="relative group flex-shrink-0">
      <!-- Glow ring -->
      <div class="absolute inset-0 bg-gradient-to-r from-[#0072ab] to-[#41a748] rounded-lg blur-lg opacity-60 group-hover:opacity-100 transition-opacity"></div>

      <!-- Omni Learning Logo -->
      <div class="relative w-12 h-12 rounded-lg overflow-hidden shadow-xl bg-white">
        <img
          src="logo.png"
          alt="Omni Learning Logo"
          class="w-full h-full object-contain p-1"
        />
      </div>
    </div>

    <!-- Text - Hidden when collapsed -->
    <div
      [class.opacity-0]="isCollapsed"
      [class.translate-x-4]="isCollapsed"
      class="relative z-10 transition-all duration-300 whitespace-nowrap">
      <h1 class="text-xl font-black text-white tracking-tight">Omni Learning</h1>
      <p class="text-xs text-[#41a748] font-medium">School Management</p>
    </div>
  </div>

  <!-- Navigation Menu - Scrollable Section -->
 <nav class="relative flex-1 px-4 py-6 space-y-2 overflow-y-auto scroll-smooth">

  @for (item of menuItems; track item.route; let i = $index) {
    <a
      [routerLink]="item.route"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: false }"
      (click)="closeMobileMenu()"
      [class.justify-center]="isCollapsed"
      [title]="isCollapsed ? item.label : ''"
      class="group relative flex items-center gap-4 px-5 py-4 rounded-lg text-slate-300 hover:text-white transition-all duration-300 cursor-pointer overflow-hidden"
      [style.animation-delay]="i * 50 + 'ms'">

      <!-- Hover background -->
      <div class="absolute inset-0 bg-gradient-to-r from-[#0072ab]/0 to-[#00a6e6]/0 group-hover:from-[#0072ab]/20 group-hover:to-[#00a6e6]/20 transition-all duration-300 rounded-lg"></div>

      <!-- Active background -->
      <div class="absolute inset-0 bg-gradient-to-r from-[#0072ab] to-[#00a6e6] opacity-0 group-[.active-link]:opacity-100 transition-all duration-300 rounded-lg shadow-lg shadow-[#0072ab]/50"></div>

      <!-- Icon -->
      <div class="relative z-10 w-10 h-10 flex items-center justify-center rounded-lg bg-white/5 group-hover:bg-white/10 group-[.active-link]:bg-white/20 transition-all duration-300 group-hover:scale-110 flex-shrink-0">
        <lucide-icon [img]="item.icon" [size]="20"></lucide-icon>
      </div>

      <!-- Label -->
      <span
        [class.opacity-0]="isCollapsed"
        [class.translate-x-4]="isCollapsed"
        class="relative z-10 font-semibold text-sm group-[.active-link]:text-white transition-all duration-300 whitespace-nowrap">
        {{ item.label }}
      </span>

      <!-- Active indicators -->
      <div
        [class.opacity-0]="isCollapsed"
        class="relative z-10 ml-auto flex gap-1 transition-opacity duration-300">
        <span class="w-1.5 h-1.5 rounded-full bg-[#00a6e6] opacity-0 group-[.active-link]:opacity-100 transition-all duration-300 animate-pulse"></span>
        <span class="w-1.5 h-1.5 rounded-full bg-[#41a748] opacity-0 group-[.active-link]:opacity-100 transition-all duration-300 animate-pulse delay-75"></span>
      </div>

      <!-- Shine -->
      <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -skew-x-12 animate-shine"></div>
      </div>

    </a>
  }

</nav>


  <!-- User Profile Section - Fixed at bottom -->

<div
  [class.px-2]="isCollapsed"
  class="relative border-t border-white/10 p-4 backdrop-blur-sm flex-shrink-0 transition-all duration-300">
  <div
    [class.flex-col]="isCollapsed"
    [class.gap-0]="isCollapsed"
    class="flex items-center gap-3 p-3 rounded-lg bg-white/5 hover:bg-white/10 transition-all duration-300 cursor-pointer group">

    <!-- Avatar with status indicator -->
    <div class="relative flex-shrink-0">
      <div class="w-12 h-12 bg-gradient-to-br from-[#0072ab] to-[#41a748] rounded-lg flex items-center justify-center shadow-lg">
        <lucide-icon [img]="User" [size]="20" class="text-white"></lucide-icon>
      </div>
      <span class="absolute bottom-0 right-0 w-3 h-3 bg-[#41a748] border-2 border-slate-900 rounded-full animate-pulse"></span>
    </div>

    <!-- User info - Hidden when collapsed -->
    <div
      [class.opacity-0]="isCollapsed"
      [class.hidden]="isCollapsed"
      class="flex-1 min-w-0 transition-all duration-300">
      <p class="text-sm font-semibold text-white truncate">{{ userName() }}</p>
      <p class="text-xs text-slate-400 truncate">{{ userEmail() }}</p>
    </div>

    <!-- Settings icon - Hidden when collapsed -->
    <lucide-icon
      [class.opacity-0]="isCollapsed"
      [class.hidden]="isCollapsed"
      [img]="Settings"
      [size]="18"
      class="text-slate-400 group-hover:text-[#41a748] group-hover:rotate-90 transition-all duration-300">
    </lucide-icon>
  </div>
</div>

  <!-- Logout Button - Fixed at bottom -->
  <div
    [class.px-2]="isCollapsed"
    class="relative border-t border-white/10 p-4 backdrop-blur-sm flex-shrink-0 transition-all duration-300">
    <button
      (click)="onLogout()"
      [class.justify-center]="isCollapsed"
      [title]="isCollapsed ? 'Logout' : ''"
      class="group w-full flex items-center gap-4 px-5 py-4 rounded-lg text-slate-300 hover:text-white bg-red-500/10 hover:bg-gradient-to-r hover:from-red-500 hover:to-red-600 transition-all duration-300 relative overflow-hidden">

      <!-- Animated background -->
      <div class="absolute inset-0 bg-gradient-to-r from-red-500/0 to-red-600/0 group-hover:from-red-500 group-hover:to-red-600 transition-all duration-300"></div>

      <lucide-icon
        [img]="LogOut"
        [size]="20"
        class="relative z-10 transform group-hover:scale-110 group-hover:-rotate-12 transition-all duration-300 flex-shrink-0">
      </lucide-icon>

      <span
        [class.opacity-0]="isCollapsed"
        [class.hidden]="isCollapsed"
        class="relative z-10 font-semibold transition-all duration-300 whitespace-nowrap">
        Logout
      </span>

      <!-- Hover arrow - Hidden when collapsed -->
      <lucide-icon
        [class.opacity-0]="isCollapsed"
        [class.hidden]="isCollapsed"
        [img]="ArrowRight"
        [size]="16"
        class="relative z-10 ml-auto transform translate-x-0 opacity-0 group-hover:translate-x-1 group-hover:opacity-100 transition-all duration-300">
      </lucide-icon>
    </button>
  </div>
</aside>

<!-- Spacer - Adjusts based on sidebar width -->
<div
  [class.w-72]="!isCollapsed"
  [class.w-20]="isCollapsed"
  class="hidden lg:block transition-all duration-500">
</div>
