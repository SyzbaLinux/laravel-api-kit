<header class="bg-white border-b border-gray-200 shadow-sm">
  <div class="max-w-[1600px] mx-auto px-6 sm:px-8 lg:px-12">
    <div class="flex items-center justify-between py-4">

      <!-- Page Title -->
      <div class="flex-1">
         <h1 class="text-2xl font-bold text-gray-800">{{ title() }}</h1>
      </div>

      <!-- Right Side Actions -->
      <div class="flex items-center gap-4">

        <!-- Search Bar (Desktop) -->
        <div class="hidden md:flex items-center gap-2 bg-gray-100 px-4 py-2 rounded-lg hover:bg-gray-200 transition-colors">
          <lucide-icon [img]="Search" [size]="18" class="text-gray-500"></lucide-icon>
          <input
            type="text"
            placeholder="Search..."
            class="bg-transparent outline-none text-sm text-gray-700 w-64">
        </div>

        <!-- Notifications -->
        <button class="relative p-2 hover:bg-gray-100 rounded-lg transition-colors group">
          <lucide-icon [img]="Bell" [size]="20" class="text-gray-600 group-hover:text-[#0072ab]"></lucide-icon>
          <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>

        <!-- User Profile -->
        <button class="flex items-center gap-2 p-2 hover:bg-gray-100 rounded-lg transition-colors">
          <div class="w-8 h-8 bg-gradient-to-br from-[#0072ab] to-[#41a748] rounded-full flex items-center justify-center">
            <lucide-icon [img]="User" [size]="18" class="text-white"></lucide-icon>
          </div>
          <span class="hidden md:block text-sm font-medium text-gray-700">Admin</span>
        </button>
      </div>
    </div>
  </div>
</header>
